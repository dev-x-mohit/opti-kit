name: Deploy Showcase to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice title=Vercel Deployment Notice::Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are missing or not set in GitHub Secrets."
            echo "Skipping GitHub Action deployment step."
            exit 0
          fi

          echo "Installing dependencies..."
          npm ci

          echo "Building opti-kit package..."
          npm run build:package

          echo "Writing project linking configuration for apps/showcase..."
          mkdir -p apps/showcase/.vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > apps/showcase/.vercel/project.json

          echo "Pulling Vercel environment settings for apps/showcase..."
          if ! npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/showcase; then
            echo "::notice title=Vercel Authentication Warning::Unable to retrieve project settings from Vercel API. Please ensure VERCEL_TOKEN, VERCEL_ORG_ID ($VERCEL_ORG_ID), and VERCEL_PROJECT_ID ($VERCEL_PROJECT_ID) are valid in GitHub Secrets."
            exit 0
          fi

          echo "Building Vercel production deployment for apps/showcase..."
          if ! npx vercel build --prod --token="$VERCEL_TOKEN" --cwd apps/showcase; then
            echo "::notice title=Vercel Build Warning::Vercel build failed."
            exit 0
          fi

          echo "Deploying prebuilt showcase application to Vercel..."
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd apps/showcase
