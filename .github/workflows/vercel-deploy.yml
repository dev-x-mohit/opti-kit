name: Deploy Showcase to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice title=Vercel Deployment Notice::Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are not configured in GitHub Secrets."
            echo "Skipping GitHub Action deployment. Note: Native Vercel GitHub App integration will deploy automatically if connected."
            exit 0
          fi

          echo "Installing dependencies..."
          npm ci

          echo "Building package and showcase..."
          npm run build:package
          npm run build:showcase

          echo "Pulling Vercel environment information..."
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          echo "Building Vercel production deployment..."
          npx vercel build --prod --token="$VERCEL_TOKEN"

          echo "Deploying prebuilt artifacts to Vercel..."
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
