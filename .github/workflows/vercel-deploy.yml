name: Deploy Showcase to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice title=Vercel Deployment Notice::Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are not configured in GitHub Secrets."
            echo "Skipping GitHub Action deployment."
            exit 0
          fi

          echo "Installing dependencies..."
          npm ci

          echo "Building opti-kit package..."
          npm run build:package

          echo "Cleaning any existing .vercel configuration directories..."
          rm -rf .vercel apps/showcase/.vercel

          echo "Pulling Vercel environment settings for apps/showcase..."
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/showcase

          echo "Building Vercel production deployment for apps/showcase..."
          npx vercel build --prod --token="$VERCEL_TOKEN" --cwd apps/showcase

          echo "Deploying prebuilt showcase application to Vercel..."
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd apps/showcase
