name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:package

      - name: Run tests
        run: npm run test:package

      - name: Verify package exports
        run: node -e "const ok = require('@dev_x_mohit/opti-kit'); console.log('CJS OK:', Object.keys(ok).length, 'exports')"
        working-directory: packages/opti-kit
